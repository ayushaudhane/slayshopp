<!DOCTYPE html>
<html>
<head>
<title>Wishlist - SlayShop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="header-left">
<h1>❤️ My Wishlist</h1>
<a href="index.html" style="color:white; text-decoration:none; font-size:14px;">← Back to Shop</a>
</div>
<div class="header-right">
<a href="cart.html" class="icon-link">🛒 Cart</a>
<div class="profile-dropdown">
<button class="profile-btn" onclick="toggleProfileMenu()">👤 Profile</button>
<div class="profile-menu" id="profileMenu">
<div id="loginContent">
<button onclick="goToLogin()">Login</button>
<button onclick="goToRegister()">Register</button>
</div>
<div id="userContent" style="display:none;">
<h3 id="userName"></h3>
<p><strong>Email:</strong> <span id="userEmail"></span></p>
<p><strong>Address:</strong> <span id="userAddress"></span></p>
<hr>
<a href="cart.html">➤ My Cart</a><br>
<button onclick="logout()" class="logout-btn">Logout</button>
</div>
</div>
</div>
</div>
</header>

<ul id="wishlist"></ul>

<script src="script.js"></script>

<script>

let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

let list = document.getElementById("wishlist");

wishlist.forEach((item, index) => {

let div = document.createElement("div");

div.classList.add("product-card");

div.innerHTML = `
<button class="remove-btn" onclick="removeWishlist(${index})">✖</button>

<img src="${item.image}">
<h3>${item.name}</h3>
<p>₹${item.price}</p>
`;

list.appendChild(div);

});


function removeWishlist(index){

let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

wishlist.splice(index,1);

localStorage.setItem("wishlist", JSON.stringify(wishlist));

location.reload();

}

// Initialize profile menu
checkUserLogin();

</script>

</body>
</html>
