<!DOCTYPE html>
<html>
<head>
<title>Register - SlayShop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="header-left">
<h1>SlayShop - Register</h1>
</div>
<div class="header-right">
<a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">← Back to Shop</a>
</div>
</header>

<div class="form-box">
<h2>Create Your Account</h2>

<input type="text" id="regName" placeholder="Full Name"><br><br>

<input type="email" id="regEmail" placeholder="Email"><br><br>

<input type="password" id="regPassword" placeholder="Password"><br><br>

<input type="text" id="regAddress" placeholder="Address (Optional)"><br><br>

<button onclick="register()">Register</button>

<p style="text-align:center; margin-top:20px;">Already have an account? <a href="login.html">Login Here</a></p>

</div>

<script>

function register(){
let name = document.getElementById("regName").value;
let email = document.getElementById("regEmail").value;
let password = document.getElementById("regPassword").value;
let address = document.getElementById("regAddress").value;

if(!name || !email || !password){
alert("Please fill in all required fields!");
return;
}

// Save user data to localStorage
let userData = {
name: name,
email: email,
address: address || "Not Set"
};

localStorage.setItem("currentUser", JSON.stringify(userData));

alert("Account Created! You are now logged in.");

window.location.href="index.html";
}

</script>

</body>
</html>
